---
- name: Install Kubernetes dependencies on all nodes
  hosts: k8s_cluster
  become: yes

  tasks:
    # ------------------------------------------------------------
    # 1. Disable swap
    # ------------------------------------------------------------
    # Kubernetes requires swap to be disabled.
    # If swap is enabled, kubelet may fail or behave unpredictably.

    - name: Disable swap immediately
      command: swapoff -a
      changed_when: false

    - name: Disable swap permanently in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    # ------------------------------------------------------------
    # 2. Load required kernel modules
    # ------------------------------------------------------------
    # overlay and br_netfilter are required for container networking.
    # IPVS modules are added to support kube-proxy IPVS mode.

    - name: Persist required kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
          ip_vs
          ip_vs_rr
          ip_vs_wrr
          ip_vs_sh
          nf_conntrack
        owner: root
        group: root
        mode: "0644"

    - name: Load overlay module
      modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

    - name: Load ip_vs module
      modprobe:
        name: ip_vs
        state: present

    - name: Load ip_vs_rr module
      modprobe:
        name: ip_vs_rr
        state: present

    - name: Load ip_vs_wrr module
      modprobe:
        name: ip_vs_wrr
        state: present

    - name: Load ip_vs_sh module
      modprobe:
        name: ip_vs_sh
        state: present

    - name: Load nf_conntrack module
      modprobe:
        name: nf_conntrack
        state: present

    # ------------------------------------------------------------
    # 3. Configure sysctl networking
    # ------------------------------------------------------------
    # These settings allow Kubernetes to correctly route bridged traffic
    # and forward IPv4 packets between pods and services.

    - name: Configure Kubernetes networking sysctl settings
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables=1
          net.bridge.bridge-nf-call-ip6tables=1
          net.ipv4.ip_forward=1
        owner: root
        group: root
        mode: "0644"

    - name: Apply sysctl settings
      command: sysctl --system
      changed_when: false

    # ------------------------------------------------------------
    # 4. Install base packages
    # ------------------------------------------------------------
    # containerd is the container runtime.
    # ipvsadm and ipset are required for kube-proxy IPVS mode.

    - name: Install base packages and IPVS tools
      apt:
        name:
          - containerd
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - ipvsadm
          - ipset
        state: present
        update_cache: yes

        # ------------------------------------------------------------
    # 5. Configure containerd
    # ------------------------------------------------------------
    # Force regenerate containerd config on every run.
    # This avoids stale or broken containerd configuration from previous attempts.

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Regenerate containerd default config
      shell: containerd config default > /etc/containerd/config.toml

    - name: Enable systemd cgroup driver for containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Ensure CRI plugin is not disabled
      replace:
        path: /etc/containerd/config.toml
        regexp: '^disabled_plugins = \["cri"\]'
        replace: 'disabled_plugins = []'
      ignore_errors: yes

    - name: Restart and enable containerd
      systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Wait for containerd socket
      wait_for:
        path: /run/containerd/containerd.sock
        timeout: 60

    - name: Check containerd service status
      command: systemctl is-active containerd
      register: containerd_status
      changed_when: false

    - name: Print containerd status
      debug:
        var: containerd_status.stdout
    # ------------------------------------------------------------
    # 6. Add Kubernetes apt repository
    # ------------------------------------------------------------
    # --batch --yes is required so gpg works in non-interactive scripts.

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Kubernetes apt key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | \
        gpg --dearmor --batch --yes -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /
        owner: root
        group: root
        mode: "0644"

    # ------------------------------------------------------------
    # 7. Install Kubernetes components
    # ------------------------------------------------------------

    - name: Install kubelet kubeadm kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold Kubernetes package versions
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl