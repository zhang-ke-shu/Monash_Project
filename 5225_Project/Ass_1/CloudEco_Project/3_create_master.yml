---
- name: Initialise Kubernetes master node
  hosts: masters
  become: yes

  tasks:
    # ------------------------------------------------------------
    # 1. Reset previous Kubernetes state
    # ------------------------------------------------------------

    - name: Reset previous Kubernetes state if any
      command: kubeadm reset -f
      ignore_errors: yes

    - name: Remove old Kubernetes config
      file:
        path: /etc/kubernetes
        state: absent
      ignore_errors: yes

    - name: Remove old CNI config
      file:
        path: /etc/cni/net.d
        state: absent
      ignore_errors: yes

    - name: Remove old etcd data
      file:
        path: /var/lib/etcd
        state: absent
      ignore_errors: yes

    # ------------------------------------------------------------
    # 2. Ensure container runtime is ready before kubeadm init
    # ------------------------------------------------------------
    # kubeadm needs a working CRI runtime.
    # Here we explicitly restart containerd and wait for its socket.

    - name: Restart containerd before kubeadm init
      systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Wait for containerd socket before kubeadm init
      wait_for:
        path: /run/containerd/containerd.sock
        timeout: 90

    - name: Verify containerd is active
      command: systemctl is-active containerd
      register: containerd_active
      changed_when: false

    - name: Print containerd active status
      debug:
        var: containerd_active.stdout

    - name: Wait a few seconds for containerd CRI API to become ready
      pause:
        seconds: 8

    - name: Restart kubelet before kubeadm init
      systemd:
        name: kubelet
        state: restarted
        enabled: yes
      ignore_errors: yes

    # ------------------------------------------------------------
    # 3. Initialise Kubernetes control plane
    # ------------------------------------------------------------
    # The pod network CIDR must match Calico.
    # The CRI socket is explicitly set to containerd.

    - name: Initialise Kubernetes control plane
      command: kubeadm init --pod-network-cidr=192.168.0.0/16 --cri-socket unix:///run/containerd/containerd.sock
      args:
        creates: /etc/kubernetes/admin.conf

    # ------------------------------------------------------------
    # 4. Configure kubeconfig for the ansible user
    # ------------------------------------------------------------

    - name: Create kubeconfig directory for ansible user
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy admin kubeconfig to ansible user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    # ------------------------------------------------------------
    # 5. Configure kube-proxy to use IPVS mode
    # ------------------------------------------------------------

    - name: Set kube-proxy mode to IPVS
      become_user: "{{ ansible_user }}"
      shell: |
        kubectl get configmap kube-proxy -n kube-system -o yaml \
        | sed 's/mode: ""/mode: "ipvs"/' \
        | kubectl apply -f -
      changed_when: true

    - name: Restart kube-proxy daemonset
      become_user: "{{ ansible_user }}"
      command: kubectl rollout restart daemonset kube-proxy -n kube-system
      changed_when: true

    - name: Wait for kube-proxy rollout
      become_user: "{{ ansible_user }}"
      command: kubectl rollout status daemonset kube-proxy -n kube-system --timeout=300s
      changed_when: false
      ignore_errors: yes

    # ------------------------------------------------------------
    # 6. Install Calico CNI
    # ------------------------------------------------------------

    - name: Install Calico CNI
      become_user: "{{ ansible_user }}"
      shell: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.2/manifests/calico.yaml
      changed_when: true

    # ------------------------------------------------------------
    # 7. Generate worker join command
    # ------------------------------------------------------------
    # The join command also explicitly uses containerd as CRI runtime.

    - name: Generate worker join command
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command on master
      copy:
        dest: /tmp/kubeadm_join_command.sh
        content: "{{ join_command.stdout }} --cri-socket unix:///run/containerd/containerd.sock\n"
        owner: root
        group: root
        mode: "0755"

    - name: Fetch join command to controller
      fetch:
        src: /tmp/kubeadm_join_command.sh
        dest: ./kubeadm_join_command.sh
        flat: yes