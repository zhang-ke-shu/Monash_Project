---
- name: Join worker nodes to Kubernetes cluster
  hosts: workers
  become: yes

  tasks:
    # ------------------------------------------------------------
    # 1. Reset previous Kubernetes worker state
    # ------------------------------------------------------------
    # This makes the playbook safer to re-run during testing.

    - name: Reset previous Kubernetes state if any
      command: kubeadm reset -f
      ignore_errors: yes

    - name: Remove old Kubernetes config
      file:
        path: /etc/kubernetes
        state: absent
      ignore_errors: yes

    - name: Remove old CNI config
      file:
        path: /etc/cni/net.d
        state: absent
      ignore_errors: yes

    - name: Remove old kubelet data
      file:
        path: /var/lib/kubelet
        state: absent
      ignore_errors: yes

    # ------------------------------------------------------------
    # 2. Ensure containerd is running before kubeadm join
    # ------------------------------------------------------------
    # kubeadm join needs a working CRI runtime on each worker node.
    # The previous failure happened because containerd was not ready
    # when kubeadm join was executed.

    - name: Restart containerd before kubeadm join
      systemd:
        name: containerd
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Wait for containerd socket before kubeadm join
      wait_for:
        path: /run/containerd/containerd.sock
        timeout: 90

    - name: Verify containerd is active
      command: systemctl is-active containerd
      register: containerd_active
      changed_when: false

    - name: Print containerd active status
      debug:
        var: containerd_active.stdout

    - name: Wait a few seconds for containerd CRI API to become ready
      pause:
        seconds: 8

    - name: Check containerd CRI runtime info
      command: crictl --runtime-endpoint unix:///run/containerd/containerd.sock info
      register: crictl_info
      changed_when: false

    - name: Print CRI runtime check result
      debug:
        msg: "containerd CRI runtime is ready on {{ inventory_hostname }}"

    - name: Restart kubelet before kubeadm join
      systemd:
        name: kubelet
        state: restarted
        enabled: yes
      ignore_errors: yes

    # ------------------------------------------------------------
    # 3. Read join command generated by master
    # ------------------------------------------------------------

    - name: Read join command from controller
      set_fact:
        join_command: "{{ lookup('file', './kubeadm_join_command.sh') }}"

    # ------------------------------------------------------------
    # 4. Join worker to cluster
    # ------------------------------------------------------------
    # The join command generated in 3_create_master.yml already includes:
    # --cri-socket unix:///run/containerd/containerd.sock

    - name: Join worker to cluster
      command: "{{ join_command }}"
      args:
        creates: /etc/kubernetes/kubelet.conf


- name: Verify cluster from master
  hosts: masters
  become: no

  tasks:
    # ------------------------------------------------------------
    # 5. Verify all nodes from master
    # ------------------------------------------------------------

    - name: Wait for all nodes to become Ready
      command: kubectl wait --for=condition=Ready nodes --all --timeout=300s
      changed_when: false

    - name: Show Kubernetes nodes
      command: kubectl get nodes -o wide
      register: nodes_output
      changed_when: false

    - name: Print nodes
      debug:
        var: nodes_output.stdout_lines

    - name: Show kube-system pods
      command: kubectl get pods -A -o wide
      register: pods_output
      changed_when: false

    - name: Print kube-system pods
      debug:
        var: pods_output.stdout_lines