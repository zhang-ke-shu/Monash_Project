# --- Section 4: Kubernetes Deployment Manifest ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wildlife-api-deployment
spec:
  # replicas dynamically scaled
  replicas: 1 
  selector:
    matchLabels:
      app: wildlife-api
  template:
    metadata:
      labels:
        app: wildlife-api
    spec:
      containers:
      - name: wildlife-app
        # Using the image you just pushed to GCP Artifact Registry
        image: australia-southeast1-docker.pkg.dev/composed-card-490512-r1/wildlife-repo/wildlife-api:vm-v6
        ports:
        - containerPort: 8000

        livenessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5

        # Resource requests and limits ensure each pod is constrained to 1 vCPU for benchmarking.
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
---
# --- Section 4: Public Service (Load Balancer) ---
apiVersion: v1
kind: Service
metadata:
  name: wildlife-api-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: wildlife-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30080